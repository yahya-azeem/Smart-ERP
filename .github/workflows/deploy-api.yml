name: Deploy API to Google Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGION: us-central1
  SERVICE_NAME: smart-erp-api
  IMAGE_NAME: us-central1-docker.pkg.dev/wide-ratio-423022-e8/smart-erp-api

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment:
      name: Environment
      url: ${{ steps.cloudrun-url.outputs.url }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: 'access_token'
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker authentication
        uses: docker/login-action@v3
        with:
          registry: us-central1-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--allow-unauthenticated --port=3000'
          env_vars: DATABASE_URL=${{ secrets.DATABASE_URL }},ALLOWED_ORIGINS=${{ secrets.ALLOWED_ORIGINS }},JWT_SECRET=${{ secrets.JWT_SECRET }}

      - name: Update Supabase (if needed)
        run: |
          if [ -n "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Checking for Supabase migrations..."
            # Placeholder for Supabase migration commands
            # supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          fi

      - name: Get Cloud Run URL
        id: cloudrun-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API deployed to: $URL"
