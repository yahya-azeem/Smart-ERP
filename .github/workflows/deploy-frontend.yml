name: Deploy Frontend to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: 'write'
  id-token: 'write'
  pages: 'write'

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    environment:
      name: Environment
      url: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (to get API URL)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Get API URL from Cloud Run
        id: api-url
        run: |
          API_URL=$(gcloud run services describe smart-erp-api --platform managed --region ${{ secrets.GCP_REGION }} --format 'value(status.url)' 2>/dev/null || echo "")
          if [ -z "$API_URL" ]; then
            echo "Warning: Could not get API URL from Cloud Run. Using fallback."
            echo "api_url=${{ secrets.API_URL_FALLBACK }}" >> $GITHUB_OUTPUT
            echo "Using fallback API URL: ${{ secrets.API_URL_FALLBACK }}"
          else
            echo "api_url=$API_URL" >> $GITHUB_OUTPUT
            echo "API URL: $API_URL"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: web-client
        run: npm install --force

      - name: Build Next.js static site
        working-directory: web-client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ steps.api-url.outputs.api_url }}
          NEXT_PUBLIC_BASE_PATH: ''
          CI: false

      - name: Setup Git config
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Save build output
        run: cp -r web-client/out /tmp/out

      - name: Checkout frontend-build branch
        run: |
          git fetch origin frontend-build || true
          git checkout -B frontend-build origin/frontend-build 2>/dev/null || git checkout -B frontend-build

      - name: Copy build output to root
        run: |
          find . -maxdepth 1 ! -name '.' ! -name '..' ! -name '.git' -exec rm -rf {} +
          cp -r /tmp/out/* .
          cp -r /tmp/out/.* . 2>/dev/null || true

      - name: Commit and push
        run: |
          git add -A
          git diff --staged --quiet || git commit -m "Deploy static frontend - ${{ github.sha }}"
          git push origin frontend-build --force

      - name: Deploy to GitHub Pages
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.repos.createPagesSite({
                owner: context.repo.owner,
                repo: context.repo.repo,
                source: {
                  branch: 'frontend-build',
                  path: '/'
                }
              });
              console.log('GitHub Pages created successfully');
            } catch (error) {
              if (error.status === 409 || error.status === 422) {
                console.log('GitHub Pages already configured, updating source...');
                try {
                  await github.rest.repos.updateInformationAboutPagesSite({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    source: {
                      branch: 'frontend-build',
                      path: '/'
                    }
                  });
                  console.log('GitHub Pages source updated');
                } catch (updateError) {
                  console.log('Could not update Pages config (may need manual setup):', updateError.message);
                }
              } else if (error.status === 403) {
                console.log('Insufficient permissions to configure Pages. Please configure manually in repo Settings > Pages.');
              } else {
                console.log('Could not configure Pages:', error.message);
              }
            }

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- API URL: ${{ steps.api-url.outputs.api_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- Deployed to branch: \`frontend-build\`" >> $GITHUB_STEP_SUMMARY
          echo "- GitHub Pages URL: https://${{ github.repository_owner }}.github.io/${{ github.repository }}/" >> $GITHUB_STEP_SUMMARY
