name: Deploy API to Google Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '!backend/**/*.md'

env:
  REGION: ${{ secrets.GCP_REGION }}
  SERVICE_NAME: smart-erp-api
  IMAGE_NAME: gcr.io/${{ secrets.GCP_PROJECT_ID }}/smart-erp-api

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    environment:
      name: Environment
      url: ${{ steps.cloudrun-url.outputs.url }}
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (Workload Identity)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker authentication
        run: gcloud auth configure-docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.backend
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          region: ${{ env.REGION }}
          flags: '--allow-unauthenticated --port=3000'
          env_vars: DATABASE_URL=${{ secrets.DATABASE_URL }}

      - name: Update Supabase (if needed)
        run: |
          if [ -n "${{ secrets.SUPABASE_PROJECT_REF }}" ]; then
            echo "Checking for Supabase migrations..."
            # Placeholder for Supabase migration commands
            # supabase db push --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
          fi

      - name: Get Cloud Run URL
        id: cloudrun-url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --platform managed --region ${{ env.REGION }} --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "API deployed to: $URL"

      - name: Update GitHub deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const { DATA: { deployment_status } } = await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.id }},
              state: '${{ job.status }}',
              target_url: '${{ steps.cloudrun-url.outputs.url }}',
              description: 'API deployed to Cloud Run'
            });
